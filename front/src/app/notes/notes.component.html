<div class="notes-window">
  <div class="notes-header">
    <span class="notes-title">Conversation Notes</span>
    <div class="header-actions">
      <button class="toggle-btn" (click)="isPreview = !isPreview" [title]="isPreview ? 'Edit' : 'Preview'">
        {{ isPreview ? '✏️ Edit' : '👁 Preview' }}
      </button>
      <button class="close-btn" (click)="closeWindow()">Close</button>
    </div>
  </div>
  <div class="notes-body">
    <textarea
      *ngIf="!isPreview"
      class="notes-textarea"
      [(ngModel)]="notes"
      placeholder="Write your notes in Markdown format...">
    </textarea>
    <div
      *ngIf="isPreview"
      class="notes-preview"
      [innerHTML]="renderedNotes">
    </div>
  </div>
  <div class="notes-footer">
    <span class="save-message">{{ saveMessage }}</span>
    <button class="save-btn" (click)="saveNotes()" [disabled]="isSaving">
      {{ isSaving ? 'Saving...' : 'Save' }}
    </button>
  </div>
</div>
