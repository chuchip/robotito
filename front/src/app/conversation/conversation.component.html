
<app-loading [isLoading]="this.isLoading "></app-loading>

<app-sound-playing [isPlaying]=" this.isPlayingSound"
  [style.zIndex]="999" [style.opacity]="50"
 [style.position]="'absolute'" [style.left.px]="xPos" [style.top.px]="yPos" >
</app-sound-playing>

<app-sound-recording [isRecording]="this.sound.isRecording"   (valueReturned)="stopRecording($event=='stop'?false:true)"
  [style.zIndex]="999" [style.opacity]="50"
 [style.position]="'absolute'" [style.left.px]="xPos" [style.top.px]="yPos" >
</app-sound-recording>

<!-- Floating contextual menu shown when the user selects text. The component
     listens to its own document events, so we just have to react to its
     (speak) output. -->
<app-selection-menu (speak)="onSelectionMenuSpeak($event)" [translateFn]="translateSelection"></app-selection-menu>

<div class="system" *ngIf="responseBack!=''" role="status" aria-live="polite">{{responseBack}}</div>
<div class="page">

  <app-conversation-history
    [conversations]="conversationHistory"
    [expanded]="isSidebarOpen"
    [activeId]="conversationId"
    (toggle)="toggleSidebar()"
    (choose)="historyChoose($event.id, $event.idContext)"
    (remove)="hystoryDelete($event.event, $event.id)"
    (rename)="historyRename($event.id, $event.name)"
    (review)="openReview()"
    (clear)="clearConversation()">
  </app-conversation-history>

  <div class="container">
    <!-- Body of the page when I will show the conversation  -->
    <div #conversation class="conversation" (mouseup)="getSelectedText()" (keyup)="getSelectedText()"
      role="log" aria-live="polite" aria-label="Conversation messages">
      <ng-container *ngFor="let line_chat of chatHistory; let i = index">
        <div [ngClass]="line_chat.type=='H'? 'line-human':'line-robot'" class="line" [class.hidden-text]="line_chat.type!='H' && !isRobotVisible">
        <div class="buttons-conversation">
          <button (click)="speak_aloud_response($event,i,line_chat.type,true)"
            [attr.aria-label]="'Play this message aloud'"
            matTooltip="Play this message aloud">
            <span class="material-icons" aria-hidden="true">volume_up</span>
          </button>
          <button *ngIf="line_chat.type=='H'" class="teacher-button"  [ngStyle]="{'background-color': getBackgroundColor(line_chat.line)}"
             (click)="showRating(line_chat.line)"
             aria-label="Show rating details for this message"
             matTooltip="Rating details">
            <span class="material-icons" aria-hidden="true">info</span>
          </button>
          <button *ngIf="canEditLastMessage(i) && editingIndex !== i"
             (click)="startEditLastMessage(i)"
             aria-label="Edit this message and regenerate the reply"
             matTooltip="Edit message and re-ask">
            <span class="material-icons" aria-hidden="true">edit</span>
          </button>
        </div>
        <span *ngIf="editingIndex !== i"   [ngClass]="line_chat.type=='H'? 'line-text-human':'line-text-robot'">
          <span [innerHTML]="toHtml(line_chat.msg,line_chat.type)"> </span>
        </span>
        <span *ngIf="editingIndex === i" class="line-text-human edit-line">
          <textarea id="edit_input" class="expandable-input edit-input"
            [(ngModel)]="editingText"
            (keydown)="$event.stopPropagation()"
            aria-label="Edit your last message"></textarea>
          <span class="edit-actions">
            <button (click)="saveEditLastMessage()"
              aria-label="Save edit and re-ask"
              matTooltip="Save and re-ask">
              <span class="material-icons" aria-hidden="true">check</span>
            </button>
            <button (click)="cancelEditLastMessage()"
              aria-label="Cancel edit"
              matTooltip="Cancel">
              <span class="material-icons" aria-hidden="true">close</span>
            </button>
          </span>
        </span>
      </div>
      </ng-container>
      <div *ngIf="responseMessage!=''"  class="line line-robot" [class.hidden-text]="!isRobotVisible" >
        <span class="line-text-robot">
          <span [innerHTML]="toHtml(responseMessage,'R')"></span>
        </span>
      </div>
    </div>
    <!-- Vocabulary review toolbar. Only visible while a review session is
         active. The "Next word" button highlights itself when the LLM
         judge said the user got the current word right; the user remains
         in control (3c flow) — clicking it advances regardless. -->
    <div class="review-toolbar" *ngIf="reviewState" role="toolbar" aria-label="Review session controls">
      <span class="review-toolbar__progress" *ngIf="reviewState.total > 0">
        {{ reviewState.index + (reviewState.is_finished ? 0 : 1) }} / {{ reviewState.total }}
      </span>
      <button type="button" class="review-toolbar__btn review-toolbar__btn--skip"
        (click)="reviewSkip()"
        [disabled]="reviewState.is_finished"
        aria-label="Skip current word"
        matTooltip="Skip this word">
        <span class="material-icons" aria-hidden="true">skip_next</span>
        <span>Skip word</span>
      </button>
      <span class="review-toolbar__spacer"></span>
      <button type="button" class="review-toolbar__btn review-toolbar__btn--next"
        [class.is-cued]="reviewState.last_verdict === 'correct' || reviewState.last_verdict === 'partial'"
        (click)="reviewNext()"
        [disabled]="reviewState.is_finished"
        [attr.aria-label]="reviewState.last_verdict === 'correct' ? 'Next word (teacher says correct)' : 'Next word'"
        matTooltip="Move on to the next word">
        <span>Next word</span>
        <span class="material-icons" aria-hidden="true">arrow_forward</span>
      </button>
      <button type="button" class="review-toolbar__btn review-toolbar__btn--end"
        (click)="reviewEndSession()"
        aria-label="End review session"
        matTooltip="End review and see summary">
        <span class="material-icons" aria-hidden="true">stop_circle</span>
        <span>End review</span>
      </button>
    </div>

    <!-- Input and controls (fixed at viewport bottom) -->
    <div #input class='input' >
      <app-avatar [talking]="(avatarTalking$ | async) || false" class="input-avatar"></app-avatar>
      <div class="vertical">
        <button class="button-action" (click)="clicksWindow=0; showLanguageOptions=!showLanguageOptions"
          aria-label="Show language and settings options"
          matTooltip="Settings">
            <span class="material-icons" aria-hidden="true">settings</span>
        </button>
        <button class="button-action" (click)="playRecorded()"
          aria-label="Play last recorded sound"
          matTooltip="Play recorded sound">
           <span class="material-icons" aria-hidden="true">play_arrow</span>
        </button>
      </div>
      <div class="vertical">
        <button class="button-action" (click)="speakAloud(human_input.value)"
          aria-label="Speak input text"
          matTooltip="Speak input text (F4)">
          <span class="material-icons" aria-hidden="true">volume_up</span>
        </button>
        <button class="button-action" (click)="toggleRecording()"
          [attr.aria-label]="this.sound.isRecording ? 'Stop recording' : 'Start recording'"
          matTooltip="Record voice (F2)">
          <span class="material-icons" aria-hidden="true">{{ this.sound.isRecording ? 'stop' : 'mic' }}</span>
        </button>
      </div>

      <span class="input_text">
        <textarea id="human_input" #human_input class="expandable-input"  [(ngModel)]="inputText"  (input)="adjustHeight(human_input)"
          (keydown)="speakOnF4($event,human_input.value); human_input.focus(); "
          placeholder="Type and press Enter"
          aria-label="Message input">
        </textarea>
        <button class="button-action button-send" (click)="pressEnter(true)"
          aria-label="Send message"
          matTooltip="Send text">
          <span class="material-icons" aria-hidden="true">send</span>
        </button>
      </span>
      <div class="vertical">
        <button class="button-action" (click)=" pressEsc()"
          aria-label="Stop talking"
          matTooltip="Stop talk (Esc)">
          <span class="material-icons" aria-hidden="true">cancel</span>
        </button>
        <button class="button-action" (click)=" sumary_conversation()"
          aria-label="Show conversation summary"
          matTooltip="Summary">
          <span class="material-icons" aria-hidden="true">summarize</span>
        </button>
      </div>
      <div class="vertical">
        <button class="button-action" (click)="toggleRobotVisibility()"
          [attr.aria-label]="isRobotVisible ? 'Hide robot messages' : 'Show robot messages'"
          matTooltip="Toggle robot messages visibility">
          <span class="material-icons" aria-hidden="true">{{ isRobotVisible ? 'visibility_off' : 'visibility' }}</span>
        </button>
        <button class="button-action" (click)="openNotes()"
          aria-label="Open notes"
          matTooltip="Notes">
          <span class="material-icons" aria-hidden="true">note_alt</span>
        </button>
      </div>
      <div class="vertical">
        <button class="button-action" (click)="openDictionary()"
          aria-label="Open dictionary"
          matTooltip="Dictionary">
          <span class="material-icons" aria-hidden="true">library_books</span>
        </button>
        <button class="button-action" (click)="openMemory()"
          aria-label="Open long-term memory"
          matTooltip="What Robotito remembers about you">
          <span class="material-icons" aria-hidden="true">psychology</span>
        </button>
      </div>
    </div>

    <app-settings *ngIf="showLanguageOptions" #configuration_window
      [(swTalkResponse)]="swTalkResponse"
      [(modeConversation)]="modeConversation"
      [(swSaveConversation)]="swSaveConversation"
      [(playbackSpeed)]="playbackSpeed"
      [(selectLanguage)]="selectLanguage"
      [(selectVoice)]="selectVoice"
      [(selectHumanVoice)]="human_voice"
      [(contextUrl)]="contextUrl"
      [context]="context"
      [contexts]="contexts"
      [languageOptions]="languageOptions"
      [voiceOptions]="voiceOptions"
      (close)="showLanguageOptions=false"
      (message)="showSystemMessage($event)">
    </app-settings>
    <div #summary_window >
      <app-summary *ngIf="persistence.showSummary" [selectLanguage]="this.selectLanguage"></app-summary>
    </div>
    <div #rating_window >
      <app-rating-phrase  *ngIf="swRating" [ratingPhrase]="this.ratingPhrase" (valueReturned)="swRating=false"></app-rating-phrase>
    </div>
  </div>
</div>
