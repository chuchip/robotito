<aside class="history" [class.expanded]="expanded" [class.collapsed]="!expanded"
  [attr.aria-label]="'Conversation history'">

  <header class="history__header">
    <button type="button" class="history__toggle"
      (click)="onToggle()"
      [attr.aria-expanded]="expanded"
      [attr.aria-label]="expanded ? 'Collapse conversation history' : 'Expand conversation history'"
      [matTooltip]="expanded ? 'Collapse' : 'Show conversations'"
      matTooltipPosition="right">
      <span class="material-icons" aria-hidden="true">
        {{ expanded ? 'chevron_left' : 'menu' }}
      </span>
    </button>

    <h2 class="history__title" *ngIf="expanded">Conversations</h2>

    <button type="button" class="history__clear" *ngIf="expanded"
      (click)="onClear()"
      aria-label="Start a new conversation"
      matTooltip="New conversation"
      matTooltipPosition="right">
      <span class="material-icons" aria-hidden="true">add_comment</span>
      <span class="history__clear-label">New chat</span>
    </button>
  </header>

  <!-- Tools / shortcuts. Sits between the header and the conversation list so
       it stays visible regardless of how many conversations the user has. -->
  <div class="history__tools" *ngIf="expanded">
    <button type="button" class="history__tool"
      (click)="onReview()"
      aria-label="Review words from the dictionary"
      matTooltip="Review words from the dictionary"
      matTooltipPosition="right">
      <span class="material-icons" aria-hidden="true">quiz</span>
      <span class="history__tool-label">Review words</span>
    </button>

    <div class="history__filters" role="group" aria-label="Filter conversations">
      <button type="button" class="history__filter"
        [class.history__filter--active]="filterNotes"
        (click)="toggleFilterNotes()"
        [attr.aria-pressed]="filterNotes"
        matTooltip="Only conversations with notes"
        matTooltipPosition="right">
        <span class="material-icons" aria-hidden="true">note_alt</span>
      </button>
      <button type="button" class="history__filter"
        [class.history__filter--active]="filterWords"
        (click)="toggleFilterWords()"
        [attr.aria-pressed]="filterWords"
        matTooltip="Only conversations with dictionary words"
        matTooltipPosition="right">
        <span class="material-icons" aria-hidden="true">library_books</span>
      </button>
    </div>
  </div>

  <!-- Compact icon-only entry when the side panel is collapsed. -->
  <button type="button" class="history__tool history__tool--collapsed"
    *ngIf="!expanded"
    (click)="onReview()"
    aria-label="Review words from the dictionary"
    matTooltip="Review words from the dictionary"
    matTooltipPosition="right">
    <span class="material-icons" aria-hidden="true">quiz</span>
  </button>

  <ul class="history__list" *ngIf="expanded" role="list">
    <li *ngFor="let line of filteredConversations; trackBy: trackById"
        class="history__item"
        [class.history__item--active]="line.id === activeId"
        role="listitem">

      <div class="history__entry">
        <ng-container *ngIf="editingId !== line.id; else editTpl">
          <button type="button" class="history__open"
            (click)="onChoose(line)"
            [attr.aria-label]="'Open conversation ' + line.name"
            [matTooltip]="getFormattedDate(line.final_date) | date: 'dd/MMM HH:mm'"
            matTooltipPosition="right">
            <span class="history__meta">
              <span class="history__name">{{ line.name }}</span>
              <span class="history__date">
                {{ getFormattedDate(line.final_date) | date: 'dd/MMM HH:mm' }}
              </span>
            </span>
            <span class="history__badges" aria-hidden="true">
              <span *ngIf="line.hasNotes" class="history__badge history__badge--notes"
                matTooltip="Has notes" matTooltipPosition="left">
                <span class="material-icons">note_alt</span>
              </span>
              <span *ngIf="line.hasWords" class="history__badge history__badge--words"
                matTooltip="Has dictionary words" matTooltipPosition="left">
                <span class="material-icons">library_books</span>
              </span>
            </span>
          </button>

          <button type="button" class="history__action"
            (click)="startEdit($event, line)"
            aria-label="Rename conversation"
            matTooltip="Rename conversation">
            <span class="material-icons" aria-hidden="true">edit</span>
          </button>

          <button type="button" class="history__action history__remove"
            (click)="onRemove($event, line.id)"
            aria-label="Delete conversation"
            matTooltip="Delete conversation">
            <span class="material-icons" aria-hidden="true">delete_outline</span>
          </button>
        </ng-container>

        <ng-template #editTpl>
          <input #editInput type="text" class="history__edit"
            [(ngModel)]="editingName"
            (keydown)="onEditKey($event)"
            (click)="$event.stopPropagation()"
            (blur)="commitEdit()"
            [attr.aria-label]="'Rename conversation ' + line.name"
            autofocus />
          <button type="button" class="history__action"
            (mousedown)="$event.preventDefault()"
            (click)="commitEdit($event)"
            aria-label="Save name"
            matTooltip="Save">
            <span class="material-icons" aria-hidden="true">check</span>
          </button>
          <button type="button" class="history__action"
            (mousedown)="$event.preventDefault()"
            (click)="cancelEdit($event)"
            aria-label="Cancel rename"
            matTooltip="Cancel">
            <span class="material-icons" aria-hidden="true">close</span>
          </button>
        </ng-template>
      </div>
    </li>

    <li *ngIf="filteredConversations.length === 0 && conversations.length > 0" class="history__empty">
      No conversations match the current filter.
    </li>
    <li *ngIf="conversations.length === 0" class="history__empty">
      No conversations yet. Start chatting!
    </li>
  </ul>
</aside>
