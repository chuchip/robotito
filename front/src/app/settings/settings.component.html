<div class="settings" role="dialog" aria-modal="true" aria-labelledby="settings-title">
  <header class="settings__header">
    <h2 id="settings-title" class="settings__title">Settings</h2>
    <button type="button" class="settings__close"
      (click)="onClose()"
      aria-label="Close settings"
      matTooltip="Close">
      <span class="material-icons" aria-hidden="true">close</span>
    </button>
  </header>

  <!-- Playback / general options -->
  <section class="settings__section" aria-label="Playback and general options">
    <div class="settings__row settings__row--wrap">
      <label class="check-option">
        <input type="checkbox" [ngModel]="swTalkResponse"
          (ngModelChange)="swTalkResponse = $event; swTalkResponseChange.emit($event)"
          matTooltip="Reproduce sound automatically">
        <span>Speak aloud</span>
      </label>

      <label class="check-option">
        <input type="checkbox" [ngModel]="modeConversation"
          (ngModelChange)="modeConversation = $event; modeConversationChange.emit($event)"
          matTooltip="Conversation mode">
        <span>Conversation</span>
      </label>

      <label class="check-option">
        <input type="checkbox" [ngModel]="swSaveConversation"
          (ngModelChange)="swSaveConversation = $event; swSaveConversationChange.emit($event)"
          matTooltip="Save conversation">
        <span>Save</span>
      </label>

      <label class="field">
        <span class="field__label">Max. length answers</span>
        <input class="field__input field__input--narrow" #inputMaxLengthAnswer type="number"
          [(ngModel)]="context.maxLengthAnswer"
          (blur)="onMaxLengthAnswerBlur(inputMaxLengthAnswer.value)" min="0">
      </label>
    </div>

    <div class="settings__row settings__row--wrap">
      <button type="button" class="settings__section-toggle"
        [class.is-open]="voicesExpanded"
        (click)="toggleVoices()"
        [attr.aria-expanded]="voicesExpanded"
        aria-controls="voices-section"
        matTooltip="Show/hide voice and language settings">
        <span class="material-icons" aria-hidden="true">
          {{ voicesExpanded ? 'expand_more' : 'chevron_right' }}
        </span>
        <span>Voice &amp; language</span>
        <span class="settings__section-toggle__hint">{{ selectLanguageDesc }} · {{ selectVoice }}</span>
      </button>
    </div>

    <div *ngIf="voicesExpanded" id="voices-section" class="settings__row settings__row--wrap">
      <label class="field">
        <span class="field__label">Language</span>
        <select class="field__input"
          [ngModel]="selectLanguage"
          (ngModelChange)="selectLanguage = $event; selectLanguageChange.emit($event)"
          aria-label="Language">
          <option *ngFor="let option of languageOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
      </label>

      <label class="field">
        <span class="field__label">Voice</span>
        <select class="field__input"
          [ngModel]="selectVoice"
          (ngModelChange)="selectVoice = $event; selectVoiceChange.emit($event)"
          (change)="onLanguageChange()"
          aria-label="Voice">
          <option *ngFor="let option of filteredVoiceOptions" [value]="option.label">
            {{ option.label }} - {{ option.gender }}
          </option>
        </select>
      </label>

      <label class="field">
        <span class="field__label">Alternative voice (F5)</span>
        <select class="field__input"
          [ngModel]="selectHumanVoice"
          (ngModelChange)="selectHumanVoice = $event; selectHumanVoiceChange.emit($event)"
          (change)="onHumanVoiceChange()"
          aria-label="Alternative voice">
          <optgroup *ngFor="let group of voiceOptionsByLanguage" [label]="group.languageLabel">
            <option *ngFor="let option of group.voices" [value]="option.label">
              {{ option.label }} - {{ option.gender }}
            </option>
          </optgroup>
        </select>
      </label>

      <label class="field field--speed">
        <span class="field__label">Speed: {{ playbackSpeed | number:'1.1-1' }}x</span>
        <input type="range" min="0.5" max="2" step="0.1"
          [ngModel]="playbackSpeed"
          (input)="onSpeedInput($event)"
          aria-label="Playback speed">
      </label>
    </div>
  </section>

  <!-- Context management -->
  <section class="settings__section settings__section--context" aria-label="Context">
    <h3 class="settings__subtitle">Context</h3>

    <div class="settings__row">
      <label class="field field--grow">
        <span class="field__label">Profile</span>
        <select #selectComponent class="field__input"
          [(ngModel)]="selectContext"
          (change)="onContextChange($event, selectComponent.value)"
          aria-label="Context">
          <option *ngFor="let c of contexts" [value]="c['id']">
            {{ c['label'] }}
          </option>
        </select>
      </label>

      <button type="button" class="icon-button icon-button--danger"
        (click)="onContextDelete(selectComponent.value)"
        aria-label="Remove context"
        matTooltip="Remove context">
        <span class="material-icons" aria-hidden="true">delete_outline</span>
      </button>

      <label class="field field--grow">
        <span class="field__label">New label</span>
        <input type="text" class="field__input"
          [(ngModel)]="context.label"
          placeholder="Choose a new label"
          aria-label="Context label">
      </label>
    </div>

    <textarea class="settings__textarea"
      (keydown.enter)="onContextSend($event)"
      (keydown.esc)="onClose()"
      [(ngModel)]="context.text"
      placeholder="Type a context..."
      aria-label="Context text"></textarea>

    <div class="settings__row settings__row--url">
      <label class="field field--grow">
        <span class="field__label" for="context_url">Context URL</span>
        <input id="context_url" type="text" class="field__input"
          [(ngModel)]="contextUrl"
          (ngModelChange)="contextUrlChange.emit($event)"
          placeholder="https://example.com/article"
          (keydown.enter)="onContextUrlSend(); $event.preventDefault()">
      </label>
      <button type="button" class="icon-button"
        (click)="onContextUrlSend()"
        aria-label="Load URL as context"
        matTooltip="Load URL as context">
        <span class="material-icons" aria-hidden="true">link</span>
      </button>
      <button type="button" class="icon-button icon-button--danger"
        (click)="onContextUrlClear()"
        aria-label="Clear URL context"
        matTooltip="Clear URL context">
        <span class="material-icons" aria-hidden="true">link_off</span>
      </button>
    </div>
  </section>

  <!-- Self-service: change own password (visible to all users) -->
  <section class="settings__section" aria-label="Account">
    <div class="settings__row settings__row--wrap">
      <button type="button" class="settings__section-toggle"
        [class.is-open]="passwordExpanded"
        (click)="togglePassword()"
        [attr.aria-expanded]="passwordExpanded"
        aria-controls="password-section"
        matTooltip="Change your password">
        <span class="material-icons" aria-hidden="true">
          {{ passwordExpanded ? 'expand_more' : 'chevron_right' }}
        </span>
        <span>Change my password</span>
      </button>
    </div>

    <div *ngIf="passwordExpanded" id="password-section" class="settings__row settings__row--wrap">
      <label class="field">
        <span class="field__label">Current password</span>
        <input type="password" class="field__input"
          [(ngModel)]="passwordForm.current" autocomplete="current-password">
      </label>
      <label class="field">
        <span class="field__label">New password</span>
        <input type="password" class="field__input"
          [(ngModel)]="passwordForm.next" autocomplete="new-password">
      </label>
      <label class="field">
        <span class="field__label">Confirm new password</span>
        <input type="password" class="field__input"
          [(ngModel)]="passwordForm.confirm" autocomplete="new-password"
          (keydown.enter)="onChangeOwnPassword()">
      </label>
      <button type="button" class="icon-button"
        (click)="onChangeOwnPassword()"
        aria-label="Update password"
        matTooltip="Update password">
        <span class="material-icons" aria-hidden="true">key</span>
      </button>
    </div>
  </section>

  <!-- Admin: user management (only visible to admins) -->
  <section class="settings__section" *ngIf="persistence.isAdmin()" aria-label="Admin">
    <div class="settings__row settings__row--wrap">
      <button type="button" class="settings__section-toggle"
        [class.is-open]="adminExpanded"
        (click)="toggleAdmin()"
        [attr.aria-expanded]="adminExpanded"
        aria-controls="admin-section"
        matTooltip="Manage users">
        <span class="material-icons" aria-hidden="true">
          {{ adminExpanded ? 'expand_more' : 'chevron_right' }}
        </span>
        <span>Admin &middot; Users</span>
      </button>
    </div>

    <div *ngIf="adminExpanded" id="admin-section">
      <h3 class="settings__subtitle">Add new user</h3>
      <div class="settings__row settings__row--wrap">
        <label class="field">
          <span class="field__label">User</span>
          <input type="text" class="field__input" [(ngModel)]="newUser.user_id" placeholder="username">
        </label>
        <label class="field">
          <span class="field__label">Password</span>
          <input type="password" class="field__input" [(ngModel)]="newUser.password" placeholder="password">
        </label>
        <label class="field">
          <span class="field__label">Role</span>
          <select class="field__input" [(ngModel)]="newUser.role">
            <option value="user">user</option>
            <option value="admin">admin</option>
          </select>
        </label>
        <button type="button" class="icon-button"
          (click)="onAdminCreateUser()"
          aria-label="Create user"
          matTooltip="Create user">
          <span class="material-icons" aria-hidden="true">person_add</span>
        </button>
      </div>

      <h3 class="settings__subtitle">Existing users</h3>
      <div *ngIf="adminLoading">Loading...</div>
      <div class="settings__row settings__row--wrap" *ngFor="let u of adminUsers">
        <label class="field">
          <span class="field__label">User</span>
          <input type="text" class="field__input" [value]="u.user_id" readonly>
        </label>
        <label class="field">
          <span class="field__label">Role</span>
          <select class="field__input" [(ngModel)]="u.role" (change)="onAdminChangeRole(u)">
            <option value="user">user</option>
            <option value="admin">admin</option>
          </select>
        </label>
        <label class="field">
          <span class="field__label">New password</span>
          <input type="password" class="field__input" [(ngModel)]="u.newPassword" placeholder="leave blank to keep">
        </label>
        <button type="button" class="icon-button"
          (click)="onAdminResetPassword(u)"
          aria-label="Reset password"
          matTooltip="Reset password">
          <span class="material-icons" aria-hidden="true">key</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Footer info -->
  <footer class="settings__footer">
    <div class="settings__info">
      <span><strong>Language:</strong> {{ selectLanguageDesc }}</span>
      <span><strong>Voice:</strong> {{ selectVoice }}</span>
      <span *ngIf="selectHumanVoice"><strong>Alt:</strong> {{ selectHumanVoice }}</span>
    </div>
    <div class="settings__user">
      <span>User: <strong>{{ persistence.getUser() }}</strong></span>
      <button type="button" class="icon-button"
        (click)="onLogin()"
        aria-label="Logout and login again"
        matTooltip="Login">
        <span class="material-icons" aria-hidden="true">login</span>
      </button>
      <span class="settings__version">v20250427.1</span>
    </div>
  </footer>
</div>
