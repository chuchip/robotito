<div *ngIf="showMenu" class="selection-menu"
  [style.left.px]="menuX" [style.top.px]="menuY"
  (mousedown)="$event.preventDefault()"
  role="menu" aria-label="Selection actions">
  <button type="button" class="selection-menu-btn" role="menuitem"
    (click)="onSpeak(false)"
    matTooltip="Speak aloud (F4)"
    aria-label="Speak aloud">
    <span class="material-icons" aria-hidden="true">volume_up</span>
    <span>Speak aloud</span>
    <span class="shortcut">F4</span>
  </button>
  <button type="button" class="selection-menu-btn" role="menuitem"
    (click)="onSpeak(true)"
    matTooltip="Speak aloud with alternative voice (Shift+F4)"
    aria-label="Speak aloud with alternative voice">
    <span class="material-icons" aria-hidden="true">record_voice_over</span>
    <span>Alternative voice</span>
    <span class="shortcut">Shift+F4</span>
  </button>
  <button type="button" class="selection-menu-btn" role="menuitem"
    (click)="onTranslate()"
    matTooltip="Translate selected text to Spanish"
    aria-label="Translate selected text">
    <span class="material-icons" aria-hidden="true">translate</span>
    <span>Translate</span>
  </button>
</div>

<div *ngIf="showTranslation" class="selection-translation"
  [style.left.px]="translationX" [style.top.px]="translationY"
  (mousedown)="$event.preventDefault()"
  role="dialog" aria-label="Translation">
  <div class="selection-translation-header">
    <span class="material-icons" aria-hidden="true">translate</span>
    <span>Spanish</span>
    <button type="button" class="selection-translation-close"
      (click)="closeTranslation()"
      aria-label="Close translation">×</button>
  </div>
  <div class="selection-translation-body">
    <span *ngIf="translationLoading" class="selection-translation-loading">Translating…</span>
    <span *ngIf="!translationLoading">{{ translationText }}</span>
  </div>
</div>
