<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Avatar Preview</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: sans-serif;
      gap: 40px;
    }
    h2 { color: #eee; }
    p { color: #aaa; font-size: 14px; }
    .demo-row { display: flex; gap: 80px; }
    .demo-box { text-align: center; }

    .avatar {
      position: relative;
      width: 150px;
      height: 126px;
      margin: 0 auto;
      animation: none;
    }
    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .mouth-cover {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      width: 46%;
      height: 22%;
      background: #EBEBEC;
      border-radius: 50%;
    }
    .mouth {
      position: absolute;
      bottom: 13%;
      left: 53%;
      transform: translateX(-50%);
      width: 28%;
      height: 6px;
      background: #0086B6;
      border-radius: 4px;
      transition: all 0.2s ease;
    }
    .eye-left, .eye-right {
      position: absolute;
      top: 52%;
      width: 14px;
      height: 14px;
      background: transparent;
      border-radius: 50%;
      animation: blink 4s ease-in-out infinite;
    }
    .eye-left { left: 30%; }
    .eye-right { right: 30%; animation-delay: 0.1s; }

    @keyframes idle-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(2px); }
    }
    @keyframes blink {
      0%, 90%, 100% { height: 14px; opacity: 0; }
      94%, 96% { height: 3px; opacity: 1; background: #EBEBEC; }
    }
    @keyframes mouth-talk {
      0%   { height: 6px;  width: 28%; border-radius: 4px; }
      10%  { height: 16px; width: 22%; border-radius: 50%; }
      20%  { height: 8px;  width: 26%; border-radius: 5px; }
      30%  { height: 20px; width: 18%; border-radius: 50%; }
      40%  { height: 10px; width: 28%; border-radius: 5px; }
      50%  { height: 18px; width: 16%; border-radius: 50%; }
      60%  { height: 6px;  width: 24%; border-radius: 4px; }
      70%  { height: 14px; width: 20%; border-radius: 50%; }
      80%  { height: 8px;  width: 28%; border-radius: 4px; }
      90%  { height: 12px; width: 18%; border-radius: 50%; }
      100% { height: 6px;  width: 28%; border-radius: 4px; }
    }
    .avatar.talking .mouth {
      animation: mouth-talk 1.2s ease-in-out infinite;
    }
    @keyframes eye-talk {
      0%, 100% { transform: translate(0, 0); }
      15% { transform: translate(-3px, -1px); }
      30% { transform: translate(2px, 1px); }
      50% { transform: translate(-1px, 2px); }
      70% { transform: translate(3px, -1px); }
      85% { transform: translate(-2px, 0); }
    }
    .avatar.talking .eye-left,
    .avatar.talking .eye-right {
      animation: blink 4s ease-in-out infinite, eye-talk 2.5s ease-in-out infinite;
    }
    .avatar.talking {
      animation: none;
    }
    .toggle-btn {
      padding: 12px 24px;
      background: #0086B6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .toggle-btn:hover { background: #006a91; }
  </style>
</head>
<body>
  <h2>Robot Avatar Preview</h2>

  <div class="demo-row">
    <div class="demo-box">
      <p>Idle</p>
      <div class="avatar">
        <img class="avatar-img" src="face.svg" alt="Robot">
        <div class="mouth-cover"></div>
        <div class="mouth"></div>
        <div class="eye-left"></div>
        <div class="eye-right"></div>
      </div>
    </div>

    <div class="demo-box">
      <p>Talking</p>
      <div class="avatar talking">
        <img class="avatar-img" src="face.svg" alt="Robot">
        <div class="mouth-cover"></div>
        <div class="mouth"></div>
        <div class="eye-left"></div>
        <div class="eye-right"></div>
      </div>
    </div>
  </div>

  <br>
  <div class="demo-box">
    <p>Interactive</p>
    <div class="avatar" id="avatar-toggle">
      <img class="avatar-img" src="face.svg" alt="Robot">
      <div class="mouth-cover"></div>
      <div class="mouth"></div>
      <div class="eye-left"></div>
      <div class="eye-right"></div>
    </div>
    <br>
    <button class="toggle-btn" onclick="document.getElementById('avatar-toggle').classList.toggle('talking')">
      Toggle Talking
    </button>
  </div>
</body>
</html>
